<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel | Guard Performance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Sentinel <span>/ Engine</span></h1>
            </div>
            <div class="header-actions">
                <div class="status-badge" id="backend-status">
                    <span class="dot online"></span> <span id="status-text">SYSTEM ACTIVE</span>
                </div>
                <button id="reset-btn" class="btn btn-secondary">Flush Store</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left: Config & Simulation -->
            <div class="sidebar">
                <section class="card config-panel">
                    <div class="card-header">
                        <h2>Guard Configuration</h2>
                    </div>
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Rate Limit (Tokens/min)</label>
                            <input type="number" id="cfg-token-limit" value="1000">
                        </div>
                        <div class="input-group">
                            <label>Daily Budget ($)</label>
                            <input type="number" id="cfg-cost-limit" value="10">
                        </div>
                        <div class="input-group">
                            <label>Similarity Threshold</label>
                            <input type="number" id="cfg-sim-threshold" value="3">
                        </div>
                    </div>
                    <button id="update-config-btn" class="btn btn-primary" style="width: 100%;">Apply Policy</button>
                </section>

                <section class="card simulation-panel">
                    <div class="card-header">
                        <h2>Traffic Simulator</h2>
                    </div>
                    <div class="input-group">
                        <label>Subject ID</label>
                        <input type="text" id="subject-id" value="user_alpha">
                    </div>
                    <div class="input-group">
                        <label>Payload</label>
                        <textarea id="prompt-input" rows="4" placeholder="Simulate prompt input..."></textarea>
                    </div>
                    <div class="action-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                        <button id="send-request-btn" class="btn btn-primary">Fire Request</button>
                        <button id="huge-prompt-btn" class="btn btn-secondary">Bulk Payload</button>
                    </div>
                </section>
            </div>

            <!-- Center: Live Logs -->
            <section class="card logs-panel">
                <div class="card-header">
                    <h2>Protection Streams</h2>
                    <span class="tag">REAL-TIME</span>
                </div>
                <div id="logs-container" class="logs-scroll">
                    <div class="empty-state">
                        <i>🛡️</i>
                        Monitoring active. Send a simulation request to begin streaming.
                    </div>
                </div>
            </section>

            <!-- Right: Real-time Metrics -->
            <div class="metrics-panel">
                <section class="card">
                    <div class="card-header">
                        <h2>Global Context</h2>
                    </div>
                    <div class="metrics-grid">
                        <div class="metric-card">
                            <span class="label">Total Keys</span>
                            <span class="value" id="stat-total-keys">0</span>
                        </div>
                        <div class="metric-card">
                            <span class="label">Active Subjects</span>
                            <span class="value" id="stat-active-subjects">0</span>
                        </div>
                    </div>
                </section>

                <section class="card" style="margin-top: 2rem;">
                    <div class="card-header">
                        <h2>Subject Breakdown</h2>
                        <button id="refresh-stats-btn" class="btn btn-secondary"
                            style="padding: 0.25rem 0.75rem; font-size: 0.7rem;">Sync</button>
                    </div>
                    <div id="subject-list" class="subject-list">
                        <!-- Dynamic content -->
                        <div class="empty-state" style="padding: 2rem 0;">No subjects tracked.</div>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="app.ts"></script>
</body>

</html>
