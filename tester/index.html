<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Testing Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <h1>Sentinel <span>Testing Suite</span></h1>
            </div>
            <div class="header-actions">
                <button id="reset-btn" class="btn btn-secondary">Reset Store</button>
                <div class="status-badge" id="backend-status">
                    <span class="dot"></span> Backend: <span id="status-text">Checking...</span>
                </div>
            </div>
        </header>

        <main>
            <section class="config-panel card">
                <h2>Guard Configuration</h2>
                <div class="config-grid">
                    <div class="input-group">
                        <label>Minute Token Limit</label>
                        <input type="number" id="cfg-token-limit" value="1000">
                    </div>
                    <div class="input-group">
                        <label>Daily Cost Limit ($)</label>
                        <input type="number" id="cfg-cost-limit" value="10">
                    </div>
                    <div class="input-group">
                        <label>Similarity Window (ms)</label>
                        <input type="number" id="cfg-sim-window" value="60000">
                    </div>
                    <div class="input-group">
                        <label>Similarity Threshold</label>
                        <input type="number" id="cfg-sim-threshold" value="3">
                    </div>
                    <div class="input-group">
                        <label>Spend Spike Multiplier</label>
                        <input type="number" id="cfg-spike-multi" value="2.5" step="0.1">
                    </div>
                    <div class="input-group checkbox-group">
                        <label>
                            <input type="checkbox" id="cfg-block-violation" checked>
                            Block on Violation
                        </label>
                    </div>
                </div>
                <button id="update-config-btn" class="btn btn-primary">Update Configuration</button>
            </section>

            <div class="main-grid">
                <section class="simulation-panel card">
                    <h2>Simulate Request</h2>
                    <div class="input-group">
                        <label>Subject ID</label>
                        <input type="text" id="subject-id" value="test_user_1">
                    </div>
                    <div class="input-group">
                        <label>Model</label>
                        <input type="text" id="model-id" value="gpt-4o">
                    </div>
                    <div class="input-group">
                        <label>Prompt</label>
                        <textarea id="prompt-input" rows="5" placeholder="Enter your prompt here..."></textarea>
                    </div>
                    <div class="action-row">
                        <button id="send-request-btn" class="btn btn-primary btn-large">Send Request</button>
                        <button id="huge-prompt-btn" class="btn btn-outline">Fill Huge Prompt</button>
                    </div>
                </section>

                <section class="results-panel card">
                    <h2>Live Logs</h2>
                    <div id="logs-container" class="logs-container">
                        <div class="empty-state">No requests yet. Send a simulation request to see results.</div>
                    </div>
                </section>
            </div>

            <section class="stats-panel card">
                <div class="section-header">
                    <h2>Redis Metadata</h2>
                    <button id="refresh-stats-btn" class="btn btn-small btn-secondary">Refresh</button>
                </div>
                <div id="stats-container" class="stats-container">
                    <pre id="stats-display" class="code-block">{}</pre>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="app.ts"></script>
</body>
</html>
